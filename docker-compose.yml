services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: webster_shop
      POSTGRES_USER: webster_shop
      POSTGRES_PASSWORD: webster_shop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://webster_shop:webster_shop@db:5432/webster_shop
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
